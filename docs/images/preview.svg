<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="Stratum card preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#23252a"/>
      <stop offset="1" stop-color="#1a1c1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ff9b42"/>
      <stop offset="1" stop-color="#ff7b2b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="20" y="20" width="680" height="180" rx="18" fill="url(#bg)" stroke="#2f3137" stroke-width="1"/>

  <!-- Header row -->
  <g transform="translate(44 56)">
    <!-- Floor icon -->
    <g fill="url(#accent)" filter="url(#glow)">
      <rect x="0"  y="22" width="28" height="6" rx="2"/>
      <rect x="0"  y="12" width="28" height="6" rx="2" opacity="0.75"/>
      <rect x="0"  y="2"  width="28" height="6" rx="2" opacity="0.5"/>
    </g>
    <!-- Area title -->
    <text x="48" y="26" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="22" font-weight="600" fill="#ececec">Parter</text>

    <!-- Chips -->
    <g transform="translate(360 6)" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="13" fill="#ececec">
      <!-- Lights -->
      <g transform="translate(0 0)">
        <rect width="68" height="32" rx="16" fill="#2a2c31" stroke="#3a3d44"/>
        <circle cx="18" cy="16" r="5" fill="#ffc107"/>
        <text x="34" y="20" fill="#ffc107" font-weight="600">3</text>
      </g>
      <!-- Windows -->
      <g transform="translate(80 0)">
        <rect width="68" height="32" rx="16" fill="#2a2c31" stroke="#3a3d44"/>
        <rect x="13" y="10" width="12" height="12" rx="2" fill="none" stroke="#42a5f5" stroke-width="2"/>
        <text x="34" y="20" fill="#42a5f5" font-weight="600">1</text>
      </g>
      <!-- Presence -->
      <g transform="translate(160 0)">
        <rect width="68" height="32" rx="16" fill="#2a2c31" stroke="#3a3d44"/>
        <circle cx="18" cy="16" r="5" fill="#4caf50"/>
        <text x="32" y="20" fill="#4caf50" font-weight="600">on</text>
      </g>
      <!-- Expander chevron -->
      <g transform="translate(248 8)" stroke="#9aa0a6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="0,4 8,12 16,4"/>
      </g>
    </g>
  </g>

  <!-- Divider -->
  <line x1="36" y1="110" x2="684" y2="110" stroke="#2c2e34" stroke-width="1"/>

  <!-- Room rows (expanded body preview) -->
  <g font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="14" fill="#cfd2d6">
    <g transform="translate(44 134)">
      <circle cx="10" cy="10" r="10" fill="#2a2c31" stroke="#3a3d44"/>
      <text x="32" y="14">Salon</text>
      <text x="640" y="14" text-anchor="end" fill="#888" font-size="12">22.4 °C · 💡 2</text>
    </g>
    <g transform="translate(44 168)">
      <circle cx="10" cy="10" r="10" fill="#2a2c31" stroke="#3a3d44"/>
      <text x="32" y="14">Kuchnia</text>
      <text x="640" y="14" text-anchor="end" fill="#888" font-size="12">21.8 °C · 🪟 1</text>
    </g>
  </g>
</svg>
